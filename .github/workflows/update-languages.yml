name: Update language stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-language-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate languages.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ZuKaTo99
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const username = process.env.GITHUB_USERNAME;
          const token = process.env.GITHUB_TOKEN;

          const colors = {
            "C#": "#178600",
            "HTML": "#e34c26",
            "CSS": "#663399",
            "JavaScript": "#f1e05a",
            "TypeScript": "#3178c6",
            "Python": "#3572A5",
            "C++": "#f34b7d",
            "C": "#555555",
            "Java": "#b07219",
            "Rust": "#dea584",
            "Shell": "#89e051",
            "PowerShell": "#012456",
            "Batchfile": "#C1F12E",
            "Dockerfile": "#384d54",
            "Vue": "#41b883",
            "Svelte": "#ff3e00",
            "PHP": "#4F5D95",
            "Ruby": "#701516",
            "Go": "#00ADD8"
          };

          function escapeXml(value) {
            return String(value)
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;")
              .replaceAll('"', "&quot;");
          }

          async function githubJson(url) {
            const response = await fetch(url, {
              headers: {
                "Accept": "application/vnd.github+json",
                "Authorization": `Bearer ${token}`,
                "X-GitHub-Api-Version": "2022-11-28"
              }
            });

            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}: ${url}`);
            }

            return response.json();
          }

          async function getAllRepos() {
            let page = 1;
            const repos = [];

            while (true) {
              const url = `https://api.github.com/users/${username}/repos?type=owner&sort=updated&per_page=100&page=${page}`;
              const result = await githubJson(url);

              repos.push(...result);

              if (result.length < 100) {
                break;
              }

              page++;
            }

            return repos.filter(repo => !repo.fork && !repo.archived);
          }

          function buildSvg(languageStats) {
            const totalBytes = Object.values(languageStats).reduce((sum, value) => sum + value, 0);

            if (totalBytes === 0) {
              return `
          <svg width="420" height="170" viewBox="0 0 420 170" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="420" height="170" rx="12" fill="#0D1117"/>
            <text x="28" y="40" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Languages</text>
            <text x="28" y="88" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="14">No language data found yet.</text>
          </svg>`.trim();
            }

            const entries = Object.entries(languageStats)
              .map(([name, bytes]) => ({
                name,
                bytes,
                percent: (bytes / totalBytes) * 100,
                color: colors[name] || "#8B949E"
              }))
              .sort((a, b) => b.bytes - a.bytes)
              .slice(0, 8);

            const visibleTotal = entries.reduce((sum, item) => sum + item.bytes, 0);
            const normalizedEntries = entries.map(item => ({
              ...item,
              percent: (item.bytes / visibleTotal) * 100
            }));

            let currentX = 28;
            const barWidth = 340;
            const barParts = normalizedEntries.map((item, index) => {
              const width = Math.max(3, (item.percent / 100) * barWidth);
              const rect = `<rect x="${currentX.toFixed(2)}" y="62" width="${width.toFixed(2)}" height="10" rx="${index === 0 || index === normalizedEntries.length - 1 ? 5 : 0}" fill="${item.color}"/>`;
              currentX += width;
              return rect;
            }).join("\n  ");

            const legend = normalizedEntries.map((item, index) => {
              const column = index % 2;
              const row = Math.floor(index / 2);
              const x = column === 0 ? 30 : 210;
              const y = 102 + row * 28;

              return `
            <circle cx="${x}" cy="${y - 4}" r="5" fill="${item.color}"/>
            <text x="${x + 14}" y="${y}" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">${escapeXml(item.name)}</text>
            <text x="${x + 95}" y="${y}" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="14">${item.percent.toFixed(1)}%</text>`;
            }).join("\n");

            return `
          <svg width="420" height="210" viewBox="0 0 420 210" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="420" height="210" rx="12" fill="#0D1117"/>

            <text x="28" y="36" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
              Languages
            </text>

            <rect x="28" y="62" width="340" height="10" rx="5" fill="#21262D"/>
            ${barParts}

            ${legend}

            <line x1="28" y1="182" x2="392" y2="182" stroke="#30363D"/>
            <text x="28" y="199" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="11">
              Auto-generated from public GitHub repository language data.
            </text>
          </svg>`.trim();
          }

          async function main() {
            const repos = await getAllRepos();
            const languageStats = {};

            for (const repo of repos) {
              const languages = await githubJson(repo.languages_url);

              for (const [language, bytes] of Object.entries(languages)) {
                languageStats[language] = (languageStats[language] || 0) + bytes;
              }
            }

            const svg = buildSvg(languageStats);

            fs.mkdirSync("assets", { recursive: true });
            fs.writeFileSync(path.join("assets", "languages.svg"), svg, "utf8");

            console.log("Generated assets/languages.svg");
          }

          main().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/languages.svg

          if git diff --cached --quiet; then
            echo "No language changes to commit."
          else
            git commit -m "chore(profile): update language stats"
            git push
          fi
