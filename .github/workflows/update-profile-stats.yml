name: Update profile stats

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update-profile-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate profile stats and heatmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ZuKaTo99
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const username = process.env.GITHUB_USERNAME;
          const token = process.env.GITHUB_TOKEN;

          function escapeXml(value) {
            return String(value)
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;")
              .replaceAll('"', "&quot;");
          }

          function formatNumber(value) {
            return new Intl.NumberFormat("en-US").format(value);
          }

          async function githubGraphQl(query, variables) {
            const response = await fetch("https://api.github.com/graphql", {
              method: "POST",
              headers: {
                "Accept": "application/vnd.github+json",
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ query, variables })
            });

            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}`);
            }

            const result = await response.json();

            if (result.errors) {
              throw new Error(JSON.stringify(result.errors, null, 2));
            }

            return result.data;
          }

          function calculateStreaks(days) {
            const sortedDays = [...days].sort((a, b) => a.date.localeCompare(b.date));

            let longestStreak = 0;
            let currentRun = 0;

            for (const day of sortedDays) {
              if (day.contributionCount > 0) {
                currentRun++;
                longestStreak = Math.max(longestStreak, currentRun);
              } else {
                currentRun = 0;
              }
            }

            let currentStreak = 0;

            for (let index = sortedDays.length - 1; index >= 0; index--) {
              if (sortedDays[index].contributionCount > 0) {
                currentStreak++;
              } else {
                break;
              }
            }

            return {
              currentStreak,
              longestStreak
            };
          }

          function buildProfileStatsSvg(totalContributions, currentStreak, longestStreak) {
            return `
          <svg width="420" height="190" viewBox="0 0 420 190" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="420" height="190" rx="12" fill="#0D1117"/>

            <text x="28" y="36" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
              Contributions
            </text>

            <line x1="28" y1="52" x2="392" y2="52" stroke="#30363D"/>

            <text x="78" y="96" text-anchor="middle" fill="#79C0FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">
              ${escapeXml(formatNumber(totalContributions))}
            </text>
            <text x="78" y="124" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Total
            </text>
            <text x="78" y="145" text-anchor="middle" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">
              last 12 months
            </text>

            <line x1="148" y1="70" x2="148" y2="150" stroke="#30363D"/>

            <circle cx="210" cy="90" r="33" stroke="#EF4444" stroke-width="4.5" fill="none"/>

            <path
              d="M210 41
                 C206 47, 204 53, 205 59
                 C200.5 63, 198 69, 198 75
                 C198 84, 203 90, 210 90
                 C217 90, 222 84, 222 75
                 C222 69, 219.5 63, 215 59
                 C216 53, 214 47, 210 41Z"
              fill="#EF4444"/>

            <path
              d="M210 56
                 C208.2 59.2, 208.2 62, 209.2 64.3
                 C207.2 66.3, 206 69.2, 206 72.5
                 C206 77, 207.8 80, 210 80
                 C212.2 80, 214 77, 214 72.5
                 C214 69.2, 212.8 66.3, 210.8 64.3
                 C211.8 62, 211.8 59.2, 210 56Z"
              fill="#0D1117"/>

            <text x="210" y="103" text-anchor="middle" fill="#F59E0B" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">
              ${escapeXml(currentStreak)}
            </text>
            <text x="210" y="143" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Current streak
            </text>
            <text x="210" y="163" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">
              days
            </text>

            <line x1="272" y1="70" x2="272" y2="150" stroke="#30363D"/>

            <text x="334" y="96" text-anchor="middle" fill="#A855F7" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">
              ${escapeXml(longestStreak)}
            </text>
            <text x="334" y="124" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Longest streak
            </text>
            <text x="334" y="145" text-anchor="middle" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">
              days
            </text>
          </svg>`.trim();
          }

          function getMonthLabels(weeks, gridStartX, cellPitch) {
            const labels = [];
            let lastMonth = "";

            weeks.forEach((week, weekIndex) => {
              const firstDay = week.contributionDays[0];
              const date = new Date(firstDay.date);
              const month = date.toLocaleString("en-US", { month: "short", timeZone: "UTC" });

              if (month !== lastMonth) {
                labels.push({
                  month,
                  x: gridStartX + weekIndex * cellPitch
                });
                lastMonth = month;
              }
            });

            return labels;
          }

          function getHeatColor(count, maxCount) {
            if (count === 0) {
              return "#1F2430";
            }

            const ratio = maxCount === 0 ? 0 : count / maxCount;

            if (ratio <= 0.33) {
              return "#F59E0B";
            }

            if (ratio <= 0.66) {
              return "#A855F7";
            }

            return "#EF4444";
          }

          function buildHeatmapSvg(calendar) {
            const weeks = calendar.weeks;
            const allDays = weeks.flatMap(week => week.contributionDays);
            const totalContributions = calendar.totalContributions;
            const maxCount = Math.max(...allDays.map(day => day.contributionCount), 0);

            const width = 900;
            const height = 280;
            const gridStartX = 90;
            const gridStartY = 74;
            const cellSize = 11;
            const gap = 4;
            const cellPitch = cellSize + gap;

            const monthLabels = getMonthLabels(weeks, gridStartX, cellPitch);

            const monthTexts = monthLabels.map(label => `
            <text x="${label.x}" y="52" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">
              ${escapeXml(label.month)}
            </text>`).join("");

            const dayLabels = `
            <text x="34" y="${gridStartY + cellPitch * 1 + 9}" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">Mon</text>
            <text x="34" y="${gridStartY + cellPitch * 3 + 9}" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">Wed</text>
            <text x="34" y="${gridStartY + cellPitch * 5 + 9}" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">Fri</text>`;

            const cells = weeks.map((week, weekIndex) => {
              return week.contributionDays.map((day, dayIndex) => {
                const x = gridStartX + weekIndex * cellPitch;
                const y = gridStartY + dayIndex * cellPitch;
                const fill = getHeatColor(day.contributionCount, maxCount);

                return `
            <rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" rx="2.5" fill="${fill}">
              <title>${day.date}: ${day.contributionCount} contribution(s)</title>
            </rect>`;
              }).join("");
            }).join("");

            return `
          <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="${width}" height="${height}" rx="14" fill="#0D1117"/>

            <text x="28" y="34" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
              Contribution Activity
            </text>

            <text x="28" y="55" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="13">
              Last 12 months · ${escapeXml(formatNumber(totalContributions))} contributions
            </text>

            <text x="742" y="34" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">Less</text>
            <rect x="776" y="24" width="11" height="11" rx="2.5" fill="#1F2430"/>
            <rect x="793" y="24" width="11" height="11" rx="2.5" fill="#F59E0B"/>
            <rect x="810" y="24" width="11" height="11" rx="2.5" fill="#A855F7"/>
            <rect x="827" y="24" width="11" height="11" rx="2.5" fill="#EF4444"/>
            <text x="846" y="34" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">More</text>

            ${monthTexts}
            ${dayLabels}
            ${cells}
          </svg>`.trim();
          }

          async function main() {
            const to = new Date();
            const from = new Date(to);
            from.setFullYear(from.getFullYear() - 1);

            const query = `
              query($login: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $login) {
                  contributionsCollection(from: $from, to: $to) {
                    contributionCalendar {
                      totalContributions
                      weeks {
                        contributionDays {
                          date
                          contributionCount
                        }
                      }
                    }
                  }
                }
              }
            `;

            const data = await githubGraphQl(query, {
              login: username,
              from: from.toISOString(),
              to: to.toISOString()
            });

            const calendar = data.user.contributionsCollection.contributionCalendar;
            const days = calendar.weeks.flatMap(week => week.contributionDays);
            const streaks = calculateStreaks(days);

            const profileStatsSvg = buildProfileStatsSvg(
              calendar.totalContributions,
              streaks.currentStreak,
              streaks.longestStreak
            );

            const heatmapSvg = buildHeatmapSvg(calendar);

            fs.mkdirSync("assets", { recursive: true });
            fs.writeFileSync(path.join("assets", "profile-stats.svg"), profileStatsSvg, "utf8");
            fs.writeFileSync(path.join("assets", "contributions-heatmap.svg"), heatmapSvg, "utf8");

            console.log("Generated assets/profile-stats.svg");
            console.log("Generated assets/contributions-heatmap.svg");
          }

          main().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/profile-stats.svg
          git add assets/contributions-heatmap.svg

          if git diff --cached --quiet; then
            echo "No profile stat changes to commit."
          else
            git commit -m "chore(profile): update contribution stats"
            git push
          fi
