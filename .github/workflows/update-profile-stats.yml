name: Update profile stats

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update-profile-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate profile-stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ZuKaTo99
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const username = process.env.GITHUB_USERNAME;
          const token = process.env.GITHUB_TOKEN;

          function escapeXml(value) {
            return String(value)
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;")
              .replaceAll('"', "&quot;");
          }

          function formatNumber(value) {
            return new Intl.NumberFormat("en-US").format(value);
          }

          async function githubGraphQl(query, variables) {
            const response = await fetch("https://api.github.com/graphql", {
              method: "POST",
              headers: {
                "Accept": "application/vnd.github+json",
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ query, variables })
            });

            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}`);
            }

            const result = await response.json();

            if (result.errors) {
              throw new Error(JSON.stringify(result.errors, null, 2));
            }

            return result.data;
          }

          function calculateStreaks(days) {
            const sortedDays = [...days].sort((a, b) => a.date.localeCompare(b.date));

            let longestStreak = 0;
            let currentRun = 0;

            for (const day of sortedDays) {
              if (day.contributionCount > 0) {
                currentRun++;
                longestStreak = Math.max(longestStreak, currentRun);
              } else {
                currentRun = 0;
              }
            }

            let currentStreak = 0;

            for (let index = sortedDays.length - 1; index >= 0; index--) {
              if (sortedDays[index].contributionCount > 0) {
                currentStreak++;
              } else {
                break;
              }
            }

            return {
              currentStreak,
              longestStreak
            };
          }

          function buildSvg(totalContributions, currentStreak, longestStreak) {
            return `
          <svg width="420" height="180" viewBox="0 0 420 180" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="420" height="180" rx="12" fill="#0D1117"/>

            <text x="28" y="36" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
              Contributions
            </text>

            <line x1="28" y1="52" x2="392" y2="52" stroke="#30363D"/>

            <text x="78" y="95" text-anchor="middle" fill="#79C0FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">
              ${escapeXml(formatNumber(totalContributions))}
            </text>
            <text x="78" y="123" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Total
            </text>
            <text x="78" y="144" text-anchor="middle" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">
              last 12 months
            </text>

            <line x1="150" y1="68" x2="150" y2="148" stroke="#30363D"/>

            <circle cx="210" cy="92" r="31" stroke="#EF4444" stroke-width="4.5" fill="none"/>

            <g transform="translate(197 38) scale(1.55)">
              <path
                d="M8 16c3.314 0 6-2 6-5.5 0-1.5-.5-4-2.5-6 .25 1.5-1.25 2-1.25 2C11 4 9 .5 6 0c.357 2 .5 4-2 6-1.25 1-2 2.729-2 4.5C2 14 4.686 16 8 16m0-1c-1.657 0-3-1-3-2.75 0-.75.25-2 1.25-3C6.125 10 7 10.5 7 10.5c-.375-1.25.5-3.25 2-3.5-.179 1-.25 2 1 3 .625.5 1 1.364 1 2.25C11 14 9.657 15 8 15"
                fill="#EF4444"/>
            </g>

            <text x="210" y="104" text-anchor="middle" fill="#F59E0B" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">
              ${escapeXml(currentStreak)}
            </text>
            <text x="210" y="142" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Current streak
            </text>
            <text x="210" y="162" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">
              days
            </text>

            <line x1="270" y1="68" x2="270" y2="148" stroke="#30363D"/>

            <text x="332" y="95" text-anchor="middle" fill="#A855F7" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">
              ${escapeXml(longestStreak)}
            </text>
            <text x="332" y="123" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Longest streak
            </text>
            <text x="332" y="144" text-anchor="middle" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">
              days
            </text>
          </svg>`.trim();
          }

          async function main() {
            const to = new Date();
            const from = new Date(to);
            from.setFullYear(from.getFullYear() - 1);

            const query = `
              query($login: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $login) {
                  contributionsCollection(from: $from, to: $to) {
                    contributionCalendar {
                      totalContributions
                      weeks {
                        contributionDays {
                          date
                          contributionCount
                        }
                      }
                    }
                  }
                }
              }
            `;

            const data = await githubGraphQl(query, {
              login: username,
              from: from.toISOString(),
              to: to.toISOString()
            });

            const calendar = data.user.contributionsCollection.contributionCalendar;
            const days = calendar.weeks.flatMap(week => week.contributionDays);
            const streaks = calculateStreaks(days);

            const svg = buildSvg(
              calendar.totalContributions,
              streaks.currentStreak,
              streaks.longestStreak
            );

            fs.mkdirSync("assets", { recursive: true });
            fs.writeFileSync(path.join("assets", "profile-stats.svg"), svg, "utf8");

            console.log("Generated assets/profile-stats.svg");
          }

          main().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/profile-stats.svg

          if git diff --cached --quiet; then
            echo "No profile stat changes to commit."
          else
            git commit -m "chore(profile): update contribution stats"
            git push
          fi
