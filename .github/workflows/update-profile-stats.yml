name: Update profile stats

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update-profile-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate profile-stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ZuKaTo99
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const username = process.env.GITHUB_USERNAME;
          const token = process.env.GITHUB_TOKEN;

          function escapeXml(value) {
            return String(value)
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;")
              .replaceAll('"', "&quot;");
          }

          function formatNumber(value) {
            return new Intl.NumberFormat("en-US").format(value);
          }

          async function githubGraphQl(query, variables) {
            const response = await fetch("https://api.github.com/graphql", {
              method: "POST",
              headers: {
                "Accept": "application/vnd.github+json",
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ query, variables })
            });

            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}`);
            }

            const result = await response.json();

            if (result.errors) {
              throw new Error(JSON.stringify(result.errors, null, 2));
            }

            return result.data;
          }

          function calculateStreaks(days) {
            const sortedDays = [...days].sort((a, b) => a.date.localeCompare(b.date));

            let longestStreak = 0;
            let currentRun = 0;

            for (const day of sortedDays) {
              if (day.contributionCount > 0) {
                currentRun++;
                longestStreak = Math.max(longestStreak, currentRun);
              } else {
                currentRun = 0;
              }
            }

            let currentStreak = 0;

            for (let index = sortedDays.length - 1; index >= 0; index--) {
              if (sortedDays[index].contributionCount > 0) {
                currentStreak++;
              } else {
                break;
              }
            }

            return {
              currentStreak,
              longestStreak
            };
          }

          function buildSvg(totalContributions, currentStreak, longestStreak) {
            return `
          <svg width="420" height="210" viewBox="0 0 420 210" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="420" height="210" rx="12" fill="#0D1117"/>

            <text x="28" y="36" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
              Contributions
            </text>

            <line x1="28" y1="52" x2="392" y2="52" stroke="#30363D"/>

            <text x="70" y="95" text-anchor="middle" fill="#79C0FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">
              ${escapeXml(formatNumber(totalContributions))}
            </text>
            <text x="70" y="122" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">
              Total
            </text>
            <text x="70" y="143" text-anchor="middle" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">
              last 12 months
            </text>

            <line x1="145" y1="72" x2="145" y2="152" stroke="#30363D"/>

            <circle cx="210" cy="82" r="38" stroke="#12B5EA" stroke-width="5" fill="none"/>

            <path
              d="M210 39
                 C205 46, 206 50, 209 54
                 C202 57, 198 63, 198 70
                 C198 79, 203 86, 210 86
                 C217 86, 222 79, 222 70
                 C222 63, 218 57, 212 53
                 C215 48, 214 43, 210 39Z"
              fill="#12B5EA"/>

            <path
              d="M210 57
                 C207 61, 207 64, 209 67
                 C206 69, 204 72, 204 75
                 C204 80, 207 83, 210 83
                 C213 83, 216 80, 216 75
                 C216 72, 214 69, 212 67
                 C214 63, 213 60, 210 57Z"
              fill="#0D1117"/>

            <text x="210" y="96" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">
              ${escapeXml(currentStreak)}
            </text>
            <text x="210" y="138" text-anchor="middle" fill="#12B5EA" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Current streak
            </text>
            <text x="210" y="160" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">
              days
            </text>

            <line x1="275" y1="72" x2="275" y2="152" stroke="#30363D"/>

            <text x="340" y="95" text-anchor="middle" fill="#79C0FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">
              ${escapeXml(longestStreak)}
            </text>
            <text x="340" y="122" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">
              Longest streak
            </text>
            <text x="340" y="143" text-anchor="middle" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">
              days
            </text>

            <line x1="28" y1="182" x2="392" y2="182" stroke="#30363D"/>
            <text x="28" y="194" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="11">
              Auto-generated from public GitHub contribution data.
            </text>
          </svg>`.trim();
          }

          async function main() {
            const to = new Date();
            const from = new Date(to);
            from.setFullYear(from.getFullYear() - 1);

            const query = `
              query($login: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $login) {
                  contributionsCollection(from: $from, to: $to) {
                    contributionCalendar {
                      totalContributions
                      weeks {
                        contributionDays {
                          date
                          contributionCount
                        }
                      }
                    }
                  }
                }
              }
            `;

            const data = await githubGraphQl(query, {
              login: username,
              from: from.toISOString(),
              to: to.toISOString()
            });

            const calendar = data.user.contributionsCollection.contributionCalendar;
            const days = calendar.weeks.flatMap(week => week.contributionDays);
            const streaks = calculateStreaks(days);

            const svg = buildSvg(
              calendar.totalContributions,
              streaks.currentStreak,
              streaks.longestStreak
            );

            fs.mkdirSync("assets", { recursive: true });
            fs.writeFileSync(path.join("assets", "profile-stats.svg"), svg, "utf8");

            console.log("Generated assets/profile-stats.svg");
          }

          main().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/profile-stats.svg

          if git diff --cached --quiet; then
            echo "No profile stat changes to commit."
          else
            git commit -m "chore(profile): update contribution stats"
            git push
          fi
