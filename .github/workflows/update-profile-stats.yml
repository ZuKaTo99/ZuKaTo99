name: Update profile stats

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update-profile-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate profile-stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ZuKaTo99
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const username = process.env.GITHUB_USERNAME;
          const token = process.env.GITHUB_TOKEN;

          function escapeXml(value) {
            return String(value)
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;")
              .replaceAll('"', "&quot;");
          }

          function formatNumber(value) {
            return new Intl.NumberFormat("en-US").format(value);
          }

          async function githubGraphQl(query, variables) {
            const response = await fetch("https://api.github.com/graphql", {
              method: "POST",
              headers: {
                "Accept": "application/vnd.github+json",
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ query, variables })
            });

            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}`);
            }

            const result = await response.json();

            if (result.errors) {
              throw new Error(JSON.stringify(result.errors, null, 2));
            }

            return result.data;
          }

          function calculateStreaks(days) {
            const sortedDays = [...days].sort((a, b) => a.date.localeCompare(b.date));

            let longestStreak = 0;
            let currentRun = 0;

            for (const day of sortedDays) {
              if (day.contributionCount > 0) {
                currentRun++;
                longestStreak = Math.max(longestStreak, currentRun);
              } else {
                currentRun = 0;
              }
            }

            let currentStreak = 0;

            for (let index = sortedDays.length - 1; index >= 0; index--) {
              if (sortedDays[index].contributionCount > 0) {
                currentStreak++;
              } else {
                break;
              }
            }

            return {
              currentStreak,
              longestStreak
            };
          }

          function buildSvg(totalContributions, currentStreak, longestStreak) {
            return `
          <svg width="420" height="210" viewBox="0 0 420 210" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="streakGradient" x1="176" y1="55" x2="244" y2="123" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#22D3EE"/>
                <stop offset="100%" stop-color="#38BDF8"/>
              </linearGradient>
            </defs>

            <rect width="420" height="210" rx="12" fill="#0D1117"/>

            <text x="28" y="36" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
              Contributions
            </text>

            <line x1="28" y1="52" x2="392" y2="52" stroke="#30363D"/>

            <text x="78" y="98" text-anchor="middle" fill="#79C0FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">
              ${escapeXml(formatNumber(totalContributions))}
            </text>
            <text x="78" y="126" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Total
            </text>
            <text x="78" y="147" text-anchor="middle" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">
              last 12 months
            </text>

            <line x1="150" y1="72" x2="150" y2="154" stroke="#30363D"/>

            <circle cx="210" cy="91" r="35" stroke="url(#streakGradient)" stroke-width="5" fill="none"/>

            <circle cx="210" cy="57" r="13" fill="#0D1117"/>

            <path
              d="M210 43
                 C206 49, 207 53, 209 56
                 C204 59, 202 64, 202 69
                 C202 76, 205 81, 210 81
                 C215 81, 218 76, 218 69
                 C218 64, 216 59, 211 56
                 C214 52, 214 47, 210 43Z"
              fill="#22D3EE"/>

            <path
              d="M210 57
                 C208 60, 208 62, 209 64
                 C207 66, 206 68, 206 71
                 C206 75, 208 77, 210 77
                 C212 77, 214 75, 214 71
                 C214 68, 213 66, 211 64
                 C212 61, 212 59, 210 57Z"
              fill="#0D1117"/>

            <text x="210" y="105" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="800">
              ${escapeXml(currentStreak)}
            </text>

            <text x="210" y="146" text-anchor="middle" fill="#22D3EE" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Current streak
            </text>
            <text x="210" y="166" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">
              days
            </text>

            <line x1="270" y1="72" x2="270" y2="154" stroke="#30363D"/>

            <text x="330" y="98" text-anchor="middle" fill="#79C0FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">
              ${escapeXml(longestStreak)}
            </text>
            <text x="330" y="126" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Longest streak
            </text>
            <text x="330" y="147" text-anchor="middle" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">
              days
            </text>

            <line x1="28" y1="182" x2="392" y2="182" stroke="#30363D"/>
            <text x="28" y="194" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="11">
              Auto-generated from public GitHub contribution data.
            </text>
          </svg>`.trim();
          }

          async function main() {
            const to = new Date();
            const from = new Date(to);
            from.setFullYear(from.getFullYear() - 1);

            const query = `
              query($login: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $login) {
                  contributionsCollection(from: $from, to: $to) {
                    contributionCalendar {
                      totalContributions
                      weeks {
                        contributionDays {
                          date
                          contributionCount
                        }
                      }
                    }
                  }
                }
              }
            `;

            const data = await githubGraphQl(query, {
              login: username,
              from: from.toISOString(),
              to: to.toISOString()
            });

            const calendar = data.user.contributionsCollection.contributionCalendar;
            const days = calendar.weeks.flatMap(week => week.contributionDays);
            const streaks = calculateStreaks(days);

            const svg = buildSvg(
              calendar.totalContributions,
              streaks.currentStreak,
              streaks.longestStreak
            );

            fs.mkdirSync("assets", { recursive: true });
            fs.writeFileSync(path.join("assets", "profile-stats.svg"), svg, "utf8");

            console.log("Generated assets/profile-stats.svg");
          }

          main().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/profile-stats.svg

          if git diff --cached --quiet; then
            echo "No profile stat changes to commit."
          else
            git commit -m "chore(profile): update contribution stats"
            git push
          fi
