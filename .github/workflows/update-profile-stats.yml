name: Update profile stats

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update-profile-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate profile-stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ZuKaTo99
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const username = process.env.GITHUB_USERNAME;
          const token = process.env.GITHUB_TOKEN;

          function escapeXml(value) {
            return String(value)
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;")
              .replaceAll('"', "&quot;");
          }

          function formatNumber(value) {
            return new Intl.NumberFormat("en-US").format(value);
          }

          async function githubGraphQl(query, variables) {
            const response = await fetch("https://api.github.com/graphql", {
              method: "POST",
              headers: {
                "Accept": "application/vnd.github+json",
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ query, variables })
            });

            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}`);
            }

            const result = await response.json();

            if (result.errors) {
              throw new Error(JSON.stringify(result.errors, null, 2));
            }

            return result.data;
          }

          function calculateStreaks(days) {
            const sortedDays = [...days].sort((a, b) => a.date.localeCompare(b.date));

            let longestStreak = 0;
            let currentRun = 0;

            for (const day of sortedDays) {
              if (day.contributionCount > 0) {
                currentRun++;
                longestStreak = Math.max(longestStreak, currentRun);
              } else {
                currentRun = 0;
              }
            }

            let currentStreak = 0;

            for (let index = sortedDays.length - 1; index >= 0; index--) {
              if (sortedDays[index].contributionCount > 0) {
                currentStreak++;
              } else {
                break;
              }
            }

            return {
              currentStreak,
              longestStreak
            };
          }

          function buildSvg(totalContributions, currentStreak, longestStreak) {
            return `
          <svg width="420" height="190" viewBox="0 0 420 190" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="420" height="190" rx="12" fill="#0D1117"/>

            <text x="28" y="36" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
              Contributions
            </text>

            <line x1="28" y1="52" x2="392" y2="52" stroke="#30363D"/>

            <text x="78" y="96" text-anchor="middle" fill="#79C0FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">
              ${escapeXml(formatNumber(totalContributions))}
            </text>
            <text x="78" y="124" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Total
            </text>
            <text x="78" y="145" text-anchor="middle" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">
              last 12 months
            </text>

            <line x1="148" y1="70" x2="148" y2="150" stroke="#30363D"/>

            <circle cx="210" cy="90" r="33" stroke="#EF4444" stroke-width="4.5" fill="none"/>

            <circle cx="210" cy="54" r="11" fill="#0D1117" stroke="#EF4444" stroke-width="2.5"/>

            <path
              d="M210 44
                 C207.2 48.5, 207.2 51.5, 209.1 54.2
                 C205.5 56.9, 203.6 61.2, 203.6 65.8
                 C203.6 72, 206.2 76.2, 210 76.2
                 C213.8 76.2, 216.4 72, 216.4 65.8
                 C216.4 61.2, 214.5 56.9, 210.9 54.2
                 C212.8 51.5, 212.8 48.5, 210 44Z"
              fill="#EF4444"/>

            <path
              d="M210 56
                 C208.7 58.4, 208.8 60.3, 209.6 61.8
                 C208.1 63.1, 207.3 65, 207.3 67
                 C207.3 70.3, 208.5 72.3, 210 72.3
                 C211.5 72.3, 212.7 70.3, 212.7 67
                 C212.7 65, 211.9 63.1, 210.4 61.8
                 C211.2 60.3, 211.3 58.4, 210 56Z"
              fill="#0D1117"/>

            <text x="210" y="103" text-anchor="middle" fill="#F59E0B" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">
              ${escapeXml(currentStreak)}
            </text>
            <text x="210" y="143" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Current streak
            </text>
            <text x="210" y="163" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">
              days
            </text>

            <line x1="272" y1="70" x2="272" y2="150" stroke="#30363D"/>

            <text x="334" y="96" text-anchor="middle" fill="#A855F7" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">
              ${escapeXml(longestStreak)}
            </text>
            <text x="334" y="124" text-anchor="middle" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
              Longest streak
            </text>
            <text x="334" y="145" text-anchor="middle" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">
              days
            </text>
          </svg>`.trim();
          }

          async function main() {
            const to = new Date();
            const from = new Date(to);
            from.setFullYear(from.getFullYear() - 1);

            const query = `
              query($login: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $login) {
                  contributionsCollection(from: $from, to: $to) {
                    contributionCalendar {
                      totalContributions
                      weeks {
                        contributionDays {
                          date
                          contributionCount
                        }
                      }
                    }
                  }
                }
              }
            `;

            const data = await githubGraphQl(query, {
              login: username,
              from: from.toISOString(),
              to: to.toISOString()
            });

            const calendar = data.user.contributionsCollection.contributionCalendar;
            const days = calendar.weeks.flatMap(week => week.contributionDays);
            const streaks = calculateStreaks(days);

            const svg = buildSvg(
              calendar.totalContributions,
              streaks.currentStreak,
              streaks.longestStreak
            );

            fs.mkdirSync("assets", { recursive: true });
            fs.writeFileSync(path.join("assets", "profile-stats.svg"), svg, "utf8");

            console.log("Generated assets/profile-stats.svg");
          }

          main().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/profile-stats.svg

          if git diff --cached --quiet; then
            echo "No profile stat changes to commit."
          else
            git commit -m "chore(profile): update contribution stats"
            git push
          fi
